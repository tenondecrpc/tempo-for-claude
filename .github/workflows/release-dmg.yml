name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild archive \
            -project ClaudeTracker.xcodeproj \
            -scheme "ClaudeTracker macOS" \
            -archivePath ${{ runner.temp }}/Tempo.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Extract app from archive
        run: |
          mkdir -p ${{ runner.temp }}/app
          cp -R "${{ runner.temp }}/Tempo.xcarchive/Products/Applications/TempoForClaude.app" \
            "${{ runner.temp }}/app/TempoForClaude.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Tempo" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TempoForClaude.app" 175 178 \
            --app-drop-link 425 178 \
            --no-internet-enable \
            "${{ runner.temp }}/Tempo-${{ github.ref_name }}.dmg" \
            "${{ runner.temp }}/app/"

      - name: Generate release notes
        id: notes
        run: |
          # Get auto-generated changelog from GitHub
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' 2>/dev/null || echo "")

          cat > "${{ runner.temp }}/release-notes.md" << 'HEADER'
          ## Tempo for Claude

          macOS menu bar app for tracking Claude Code token and credit usage.

          ### Highlights
          HEADER

          # Append git tag annotation if present (use for per-release feature bullets)
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -n "$TAG_MSG" ]; then
            echo "" >> "${{ runner.temp }}/release-notes.md"
            echo "$TAG_MSG" >> "${{ runner.temp }}/release-notes.md"
          else
            echo "" >> "${{ runner.temp }}/release-notes.md"
            echo "_See changelog below for details._" >> "${{ runner.temp }}/release-notes.md"
          fi

          # Append GitHub auto-generated changelog
          if [ -n "$CHANGELOG" ]; then
            echo "" >> "${{ runner.temp }}/release-notes.md"
            echo "---" >> "${{ runner.temp }}/release-notes.md"
            echo "" >> "${{ runner.temp }}/release-notes.md"
            echo "$CHANGELOG" >> "${{ runner.temp }}/release-notes.md"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ runner.temp }}/Tempo-${{ github.ref_name }}.dmg" \
            --title "Tempo ${{ github.ref_name }}" \
            --notes-file "${{ runner.temp }}/release-notes.md"
