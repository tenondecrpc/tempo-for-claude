name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild archive \
            -project ClaudeTracker.xcodeproj \
            -scheme "ClaudeTracker macOS" \
            -archivePath ${{ runner.temp }}/Tempo.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Extract app from archive
        run: |
          mkdir -p ${{ runner.temp }}/app
          cp -R "${{ runner.temp }}/Tempo.xcarchive/Products/Applications/ClaudeTracker macOS.app" \
            "${{ runner.temp }}/app/Tempo.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Tempo" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Tempo.app" 175 178 \
            --app-drop-link 425 178 \
            --no-internet-enable \
            "${{ runner.temp }}/Tempo-${{ github.ref_name }}.dmg" \
            "${{ runner.temp }}/app/"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ runner.temp }}/Tempo-${{ github.ref_name }}.dmg" \
            --title "Tempo ${{ github.ref_name }}" \
            --generate-notes
