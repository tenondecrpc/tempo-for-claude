name: DMG - Validate Build

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.swift'
      - '**/*.xcodeproj/**'
      - '.github/workflows/*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-dmg:
    name: Validate DMG Archive
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Validate archive build
        run: |
          xcodebuild archive \
            -project ClaudeTracker.xcodeproj \
            -scheme "ClaudeTracker macOS" \
            -archivePath ${{ runner.temp }}/Tempo.xcarchive \
            -configuration Release \
            ENABLE_PREVIEWS=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty && exit ${PIPESTATUS[0]}
